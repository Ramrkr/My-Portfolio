<section id="contact" class="section contact-section">
  <div class="container">
    <h2 class="section-title">Get In Touch</h2>
    <div class="contact-content">
      <div class="contact-info">
        <h3>Let's Connect</h3>
        <p>I'm always open to discussing new projects, creative ideas, or opportunities to be part of your visions.</p>
        <div class="contact-methods">
          <a *ngFor="let method of contactMethods" [href]="method.link" class="contact-method">
            <div class="method-icon">
              <i [class]="method.icon"></i>
            </div>
            <div class="method-details">
              <h4>{{ method.title }}</h4>
              <p>{{ method.value }}</p>
            </div>
          </a>
        </div>
        <div class="social-links">
          <a href="https://github.com/Ramrkr" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-github"></i>
          </a>
          <a href="https://www.linkedin.com/in/ramrkr" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-linkedin"></i>
          </a>
          <!-- <a href="https://twitter.com" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-twitter"></i>
          </a> -->
          <a href="https://www.instagram.com/ramanathan_rk" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i>
          </a>
        </div>
      </div>
      <div class="contact-form-wrapper">
        <form #contactForm="ngForm" (ngSubmit)="onSubmit(contactForm)" class="contact-form">
          <div class="form-group">
            <input type="text" name="name" placeholder="Your Name" required ngModel>
          </div>
          <div class="form-group">
            <input type="email" name="email" placeholder="Your Email" required ngModel>
          </div>
          <div class="form-group">
            <input type="text" name="subject" placeholder="Subject" required ngModel>
          </div>
          <div class="form-group">
            <textarea name="message" rows="5" placeholder="Your Message" required ngModel></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</section>
