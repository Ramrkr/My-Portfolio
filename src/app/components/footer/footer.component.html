<footer class="footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-section">
        <h3>Portfolio</h3>
        <p>Building amazing experiences with passion and dedication.</p>
      </div>
      
      <div class="footer-section">
        <h4>Quick Links</h4>
        <ul>
          <li><a (click)="scrollToSection('about'); $event.preventDefault()">About</a></li>
          <li><a (click)="scrollToSection('skills'); $event.preventDefault()">Skills</a></li>
          <li><a (click)="scrollToSection('projects'); $event.preventDefault()">Projects</a></li>
          <li><a (click)="scrollToSection('contact'); $event.preventDefault()">Contact</a></li>
        </ul>
      </div>
      
      <div class="footer-section">
        <h4>Connect</h4>
        <div class="social-links">
          <a *ngFor="let link of socialLinks" [href]="link.url" target="_blank" rel="noopener noreferrer" [title]="link.name">
            <i [class]="link.icon"></i>
          </a>
        </div>
      </div>
    </div>
    
    <div class="footer-bottom">
      <p>&copy; {{ currentYear }} Portfolio. All rights reserved.</p>
    </div>
  </div>
</footer>
