<header [class.scrolled]="isScrolled">
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">
        <a href="#" (click)="scrollToSection('hero'); $event.preventDefault()">
          <span class="logo-text">Portfolio</span>
        </a>
      </div>
      
      <ul class="nav-menu" [class.active]="isMobileMenuOpen">
        <li><a (click)="scrollToSection('hero'); $event.preventDefault()">Home</a></li>
        <li><a (click)="scrollToSection('about'); $event.preventDefault()">About</a></li>
        <li><a (click)="scrollToSection('skills'); $event.preventDefault()">Skills</a></li>
        <li><a (click)="scrollToSection('experience'); $event.preventDefault()">Experience</a></li>
        <li><a (click)="scrollToSection('projects'); $event.preventDefault()">Projects</a></li>
        <li><a (click)="scrollToSection('contact'); $event.preventDefault()">Contact</a></li>
      </ul>
      
      <button class="mobile-menu-toggle" (click)="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>
</header>
