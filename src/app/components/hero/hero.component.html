<section id="hero" class="hero">
  <div class="hero-background">
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
  </div>
  <div class="container">
    <div class="hero-content">
      <div class="hero-text fade-in-up">
        <p class="hero-greeting">Hii, I'm</p>
        <h1 class="hero-name">
          <span class="name-highlight">Ramanathan</span>
        </h1>
        <h2 class="hero-title">
          <span class="typing-text">{{ typedText }}</span>
          <span class="typing-cursor">|</span>
        </h2>
        <p class="hero-description">
          Crafting digital experiences that blend innovation, design, and impact.
        </p>
        <div class="hero-buttons">
          <a class="btn btn-primary" (click)="scrollToSection('projects'); $event.preventDefault()">
            View My Work
          </a>
          <a class="btn btn-outline" (click)="scrollToSection('contact'); $event.preventDefault()">
            Get In Touch
          </a>
          <button routerLink="/resume" class="btn btn-primary">
            View My Resume
          </button>
          
          
          
          <!-- <a class="btn btn-primary" (click)="scrollToSection('projects'); $event.preventDefault()">
            View My Resume
          </a> -->
        </div>
        <div class="hero-social">
          <a href="https://github.com/Ramrkr" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-github"></i>
          </a>
          <a href="https://www.linkedin.com/in/ramrkr" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-linkedin"></i>
          </a>
        </div>
      </div>
      <div class="hero-image fade-in">
        <div class="image-wrapper">
          <div class="floating-shape shape-1"></div>
          <div class="floating-shape shape-2"></div>
          <div class="profile-placeholder">
            <!-- <i class="fas fa-profile"></i> -->
             <img src="assets/prof.png" alt="profile picture" />
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="scroll-indicator">
    <a (click)="scrollToSection('about'); $event.preventDefault()">
      <i class="fas fa-chevron-down"></i>
    </a>
  </div>
  <div class="resume-modal" *ngIf="showResume">
    <div class="resume-content">
      
      <div class="resume-header">
        <h3>My Resume</h3>
        <button (click)="closeResume()">✖</button>
      </div>
  
      <iframe src="assets/resume.pdf" width="100%" height="500px"></iframe>
  
      <div class="resume-actions">
        <a href="assets/resume.pdf" download class="btn btn-success">Download Resume</a>
      </div>
  
    </div>
  </div>
  
</section>
