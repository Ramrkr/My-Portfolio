<section id="projects" class="section projects-section">
  <div class="container">
    <h2 class="section-title">Featured Projects</h2>
    <div class="projects-grid">
      <div *ngFor="let project of projects" class="project-card" [class.featured]="project.featured">
        <div class="project-image">
          <img [src]="project.image" alt="{{ project.title }} homepage" class="project-screenshot" />
          <div class="project-overlay">
            <div class="project-links">
              <a [href]="project.github" target="_blank" rel="noopener noreferrer" class="project-link">
                <i class="fab fa-github"></i>
              </a>
              <a [href]="project.demo" target="_blank" rel="noopener noreferrer" class="project-link">
                <i class="fas fa-external-link-alt"></i>
              </a>
            </div>
          </div>
        </div>
        <!-- <div class="project-image">
          <div class="project-emoji">{{ project.image }}</div>
          <div class="project-overlay">
            <div class="project-links">
              <a [href]="project.github" target="_blank" rel="noopener noreferrer" class="project-link">
                <i class="fab fa-github"></i>
              </a>
              <a [href]="project.demo" target="_blank" rel="noopener noreferrer" class="project-link">
                <i class="fas fa-external-link-alt"></i>
              </a>
            </div>
          </div>
        </div> -->
        <div class="project-content">
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>
          <div class="project-tech">
            <span *ngFor="let tech of project.technologies" class="tech-badge">{{ tech }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
