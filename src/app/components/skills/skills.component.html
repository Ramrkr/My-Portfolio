<section id="skills" class="section skills-section">
  <div class="container">
    <h2 class="section-title">Skills & Technologies</h2>
    <div class="skills-content">
      <div *ngFor="let category of skillCategories; let i = index" class="skill-category" [style.animation-delay.ms]="i * 100">
        <div class="category-header">
          <div class="category-icon-wrapper">
            <i [class]="getCategoryIcon(category.category)"></i>
          </div>
          <h3 class="category-title">{{ category.category }}</h3>
        </div>
        <div class="skills-container">
          <div *ngFor="let skill of category.skills" class="skill-badge">
            <div class="skill-icon">
              <i [class]="skill.icon"></i>
            </div>
            <span class="skill-name">{{ skill.name }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
